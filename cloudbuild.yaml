        '--max-instances=1',
        '--allow-unauthenticated',
        '--set-secrets=COINGECKO_API_KEY=COINGECKO_API_KEY:latest,ETHEREUM_RPC_ENDPOINT=CM_ETHEREUM_RPC_ENDPOINT:latest,SEI_RPC_ENDPOINT=MC_SEI_RPC_ENDPOINT:latest,CELO_RPC_ENDPOINT=CM_CELO_RPC_ENDPOINT:latest,BASE_RPC_ENDPOINT=MC_BASE_RPC_ENDPOINT:latest,MANTLE_RPC_ENDPOINT=MC_MANTLE_RPC_ENDPOINT:latest,CARBON_BACKEND_SQL_CERTIFICATION=CARBON_BACKEND_SQL_CERTIFICATION:latest,DATABASE_URL=CM_DATABASE_URL:latest,COINMARKETCAP_API_KEY=COINMARKETCAP_API_KEY:latest,CODEX_API_KEY=CODEX_API_KEY:latest,ETHEREUM_TELEGRAM_BOT_TOKEN=ETHEREUM_TELEGRAM_BOT_TOKEN:latest,SEI_TELEGRAM_BOT_TOKEN=SEI_TELEGRAM_BOT_TOKEN:latest,CELO_TELEGRAM_BOT_TOKEN=CELO_TELEGRAM_BOT_TOKEN:latest,BASE_TELEGRAM_BOT_TOKEN=BASE_TELEGRAM_BOT_TOKEN:latest,MANTLE_TELEGRAM_BOT_TOKEN=MANTLE_TELEGRAM_BOT_TOKEN:latest,LINEA_RPC_ENDPOINT=MC_LINEA_RPC_ENDPOINT:latest,LINEA_TELEGRAM_BOT_TOKEN=LINEA_TELEGRAM_BOT_TOKEN:latest,BERACHAIN_RPC_ENDPOINT=MC_BERACHAIN_RPC_ENDPOINT:latest,ETHEREUM_BANCOR_PROTECTION_TOKEN=ETHEREUM_BANCOR_PROTECTION_TOKEN:latest,COTI_RPC_ENDPOINT=MC_COTI_RPC_ENDPOINT:latest,COTI_TELEGRAM_BOT_TOKEN=COTI_TELEGRAM_BOT_TOKEN:latest,BERACHAIN_TELEGRAM_BOT_TOKEN=BERACHAIN_TELEGRAM_BOT_TOKEN:latest,TAC_RPC_ENDPOINT=MC_TAC_RPC_ENDPOINT:latest,TAC_TELEGRAM_BOT_TOKEN=TAC_TELEGRAM_BOT_TOKEN:latest,MERKL_SNAPSHOT_SALT=MERKL_SNAPSHOT_SALT:latest,TENDERLY_ACCESS_KEY=TENDERLY_ACCESS_KEY:latest,TENDERLY_ACCOUNT_SLUG=TENDERLY_ACCOUNT_SLUG:latest,TENDERLY_PROJECT_SLUG=TENDERLY_PROJECT_SLUG:latest,EXTERNAL_DATABASE_HOST=EXTERNAL_DATABASE_HOST:latest,EXTERNAL_DATABASE_USERNAME=EXTERNAL_DATABASE_USERNAME:latest,EXTERNAL_DATABASE_PASSWORD=EXTERNAL_DATABASE_PASSWORD:latest,EXTERNAL_DATABASE_NAME=EXTERNAL_DATABASE_NAME:latest,PREVIEW_DB_PASSWORD=PREVIEW_DB_PASSWORD:latest',
        '--region=europe-west2',
        '--project=bancor-api',
        '--port=3000',
      ]
    waitFor: ['deploy_endpoint']
    id: 'deploy_preview_api'

  # Update the traffic
  - name: 'gcr.io/cloud-builders/gcloud'
    args: ['run', 'services', 'update-traffic', 'carbon-multi-harvester-2', '--to-latest', '--region', 'europe-west2']
    waitFor: ['deploy_preview_api']
    id: 'update_traffic'

  # Reset running preview VMs to pick up the latest image
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        INSTANCES=$$(gcloud compute instances list \
          --filter="name~'^carbon-prev-'" \
          --zones=europe-west2-b \
          --format="value(name)" \
          --project=bancor-api)
        if [ -z "$$INSTANCES" ]; then
          echo "No preview VMs to reset"
          exit 0
        fi
        echo "Resetting preview VMs: $$INSTANCES"
        for vm in $$INSTANCES; do
          echo "Resetting $$vm..."
          gcloud compute instances reset "$$vm" \
            --zone=europe-west2-b \
            --project=bancor-api || echo "Warning: failed to reset $$vm"
        done
        echo "All preview VMs reset"
    waitFor: ['update_traffic']
    id: 'reset_preview_vms'

images:
  - 'europe-west2-docker.pkg.dev/bancor-api/carbon-multi/carbon-multi:latest'
  - 'europe-west2-docker.pkg.dev/bancor-api/carbon-multi/carbon-preview:latest'

timeout: 18000s # 5 hours

options:
  machineType: 'E2_HIGHCPU_8'
  diskSizeGb: 200
  logging: 'CLOUD_LOGGING_ONLY'
