[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid
loglevel=info

[unix_http_server]
file=/var/run/supervisor.sock

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[program:postgres]
command=su-exec postgres postgres -D /var/lib/postgresql/data
autostart=true
autorestart=true
priority=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:redis]
command=redis-server --bind 127.0.0.1 --port 6379
autostart=true
autorestart=true
priority=20
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:prewarm]
command=bash -c 'until su-exec postgres pg_isready -q; do sleep 0.2; done; su-exec postgres psql -d carbon_preview -q -f /usr/src/app/prewarm.sql && echo "DB prewarm complete"'
autostart=true
autorestart=false
priority=25
startsecs=0
exitcodes=0
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:api]
command=node dist/main
directory=/usr/src/app
autostart=true
autorestart=true
priority=30
startsecs=5
startretries=3
environment=TZ="UTC",NODE_ENV="production",PORT="3000",SHOULD_HARVEST="0",SHOULD_UPDATE_ANALYTICS="0"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:worker]
command=node dist/main
directory=/usr/src/app
autostart=true
autorestart=true
priority=31
startsecs=5
startretries=3
environment=TZ="UTC",NODE_ENV="production",PORT="3001",SHOULD_HARVEST="1",SHOULD_UPDATE_ANALYTICS="1"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
